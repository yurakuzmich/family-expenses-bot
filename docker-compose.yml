# Keep a `.env` next to this file. `env_file` injects into the app container
# (BOT_TOKEN, MONGODB_URI, APP_TIMEZONE, HOST_PORT, …). Do not override those
# here, or they will beat `.env`.
#
# `HOST_PORT` / `APP_TIMEZONE` below use Compose substitution from the same `.env`
# when present.
#
# Run: docker compose up --build

services:
  app:
    build: .
    env_file:
      - .env
    ports:
      - "${HOST_PORT:-3000}:3000"
    environment:
      PORT: 3000
    restart: unless-stopped
