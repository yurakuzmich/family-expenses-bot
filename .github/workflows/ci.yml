# Verify: lint, test, build (all triggers).
# Deploy: only on push to main/master or manual workflow_dispatch — runs after verify.
#
# Secrets:
#   BOT_ENV (optional) — full .env contents for the verify job
#   SSH_PRIVATE_KEY, SSH_HOST, SSH_USER, DEPLOY_PATH — deploy (optional SSH_PORT)
#
# DEPLOY_PATH: absolute path on the server that SSH_USER can create and write
#   (e.g. /home/ubuntu/family-expences). Avoid /root, /opt, … without sudo.
#
# Server: Docker + Compose plugin. Create DEPLOY_PATH/.env on the server with at
#   least BOT_TOKEN=… (rsync does not upload .env). Otherwise Compose warns and
#   the bot has no token.
#
# Optional secret SERVER_ENV: multiline contents written to .env on the server
#   before docker compose (same keys as local .env).
#
# Optional secret SSH_KNOWN_HOSTS: lines like "HOST ssh-ed25519 AAAA..." (not only
#   "# ..." comments). If Windows ssh-keyscan prints "unsupported KEX method", the
#   server uses a key exchange your client does not support — run keyscan on the
#   server instead, e.g. ssh in then:
#     ssh-keyscan -t ed25519,rsa,ecdsa -p 22 127.0.0.1
#   Replace 127.0.0.1 in the output with your public IP or DNS name if ssh checks
#   a different host string. Or upgrade OpenSSH on Windows / use WSL.
# Use this secret if GitHub cannot run ssh-keyscan to your host (firewall, etc.).

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create .env from BOT_ENV secret
        env:
          BOT_ENV: ${{ secrets.BOT_ENV }}
        run: printf '%s\n' "$BOT_ENV" > .env

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint:ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  deploy:
    needs: verify
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'))
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      # known_hosts: use secret SSH_KNOWN_HOSTS if GitHub cannot reach your SSH port.
      - name: Trust server host key
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          if [ -z "${SSH_HOST:-}" ]; then
            echo "::error::SSH_HOST secret is empty."
            exit 1
          fi
          PORT="${SSH_PORT:-22}"
          KNOWN_HOSTS="${RUNNER_TEMP}/gh-deploy-known_hosts"
          mkdir -p "$(dirname "$KNOWN_HOSTS")"
          : > "$KNOWN_HOSTS"

          if [ -n "${SSH_KNOWN_HOSTS:-}" ]; then
            printf '%s\n' "$SSH_KNOWN_HOSTS" > "$KNOWN_HOSTS"
            echo "Using SSH_KNOWN_HOSTS secret (skipped ssh-keyscan from runner)."
          else
            # No ssh-keyscan -T: on OpenSSH that flag is a hash type, not a timeout.
            set +e
            timeout 90 ssh-keyscan -4 -t rsa,ecdsa,ed25519 -p "$PORT" "$SSH_HOST" >> "$KNOWN_HOSTS" 2>ssh-keyscan.err
            SCAN_RC=$?
            if ! grep -qE '^[^#[:space:]]' "$KNOWN_HOSTS"; then
              : > "$KNOWN_HOSTS"
              timeout 90 ssh-keyscan -t rsa,ecdsa,ed25519 -p "$PORT" "$SSH_HOST" >> "$KNOWN_HOSTS" 2>>ssh-keyscan.err
              SCAN_RC=$?
            fi
            set -e
            if [ "$SCAN_RC" -eq 124 ]; then
              echo "::error::ssh-keyscan timed out after 90s."
              cat ssh-keyscan.err || true
              echo "::notice::If your firewall blocks GitHub, add repo secret SSH_KNOWN_HOSTS with: ssh-keyscan -p $PORT $SSH_HOST"
              exit 1
            fi
            if ! grep -qE '^[^#[:space:]]' "$KNOWN_HOSTS"; then
              echo "::error::ssh-keyscan produced no host keys (exit $SCAN_RC). stderr:"
              cat ssh-keyscan.err || true
              echo "::notice::Open SSH port to the internet for GitHub Actions, OR add secret SSH_KNOWN_HOSTS — run locally: ssh-keyscan -p $PORT $SSH_HOST"
              exit 1
            fi
          fi

          if ! grep -qE '^[^#[:space:]]' "$KNOWN_HOSTS"; then
            echo "::error::known_hosts file has no key lines."
            exit 1
          fi
          echo "KNOWN_HOSTS=$KNOWN_HOSTS" >> "$GITHUB_ENV"

      - name: Ensure remote directory exists
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -e
          PORT="${SSH_PORT:-22}"
          ssh -p "$PORT" \
            -o UserKnownHostsFile="$KNOWN_HOSTS" \
            -o StrictHostKeyChecking=yes \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=120 \
            "${SSH_USER}@${SSH_HOST}" "mkdir -p '${DEPLOY_PATH}'"

      - name: Rsync repository to server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -e
          PORT="${SSH_PORT:-22}"
          export RSYNC_RSH="ssh -p $PORT -o UserKnownHostsFile=$KNOWN_HOSTS -o StrictHostKeyChecking=yes -o ServerAliveInterval=30 -o ServerAliveCountMax=120"
          rsync -avz --delete \
            --exclude node_modules \
            --exclude dist \
            --exclude coverage \
            --exclude .git \
            --exclude .env \
            --exclude '.env.*' \
            --exclude '.cursor' \
            ./ "${SSH_USER}@${SSH_HOST}:${DEPLOY_PATH}/"

      - name: Write server .env from SERVER_ENV secret
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          SERVER_ENV: ${{ secrets.SERVER_ENV }}
        run: |
          set -e
          if [ -z "$SERVER_ENV" ]; then
            echo "SERVER_ENV secret empty — using existing .env on server (create it manually if needed)."
            exit 0
          fi
          PORT="${SSH_PORT:-22}"
          printf '%s\n' "$SERVER_ENV" | ssh -p "$PORT" \
            -o UserKnownHostsFile="$KNOWN_HOSTS" \
            -o StrictHostKeyChecking=yes \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=120 \
            "${SSH_USER}@${SSH_HOST}" \
            "cat > '${DEPLOY_PATH}/.env' && chmod 600 '${DEPLOY_PATH}/.env'"

      - name: Docker Compose up
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -e
          PORT="${SSH_PORT:-22}"
          ssh -p "$PORT" \
            -o UserKnownHostsFile="$KNOWN_HOSTS" \
            -o StrictHostKeyChecking=yes \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=120 \
            "${SSH_USER}@${SSH_HOST}" \
            "cd '${DEPLOY_PATH}' && docker compose up -d --build"